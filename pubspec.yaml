name: brutalist_pos
description: "Neo-Brutalist Mobile POS Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  intl: 0.20.2
  fl_chart: ^0.65.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.5
  image_picker: ^1.2.2
  printing: ^5.14.3
  pdf: ^3.12.0
  csv: ^8.0.0
  excel: ^4.0.6
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any
  flutter_native_splash: any

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#EBEBE9"
  image: "assets/splash.png"
  color_dark: "#141416"
  image_dark: "assets/splash_dark.png"
  android_12:
    color: "#EBEBE9"
    image: "assets/splash.png"
    color_dark: "#141416"
    image_dark: "assets/splash_dark.png"
